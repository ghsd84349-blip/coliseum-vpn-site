<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coliseum VPN — Рабочий интерфейс</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0a0a0c;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .phone-mockup {
            width: 360px;
            height: 740px;
            background: #111114;
            border: 4px solid #222227;
            border-radius: 40px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }
        .header {
            text-align: center;
            width: 100%;
        }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .logo span { color: #CCFF00; }
        .status-text { color: #88888e; margin-top: 10px; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
        
        /* Интерактивная кнопка подключения */
        .vpn-button-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .power-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: #1a1a1f;
            border: 3px solid #222227;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            outline: none;
        }
        .power-btn:active { transform: scale(0.95); }
        
        /* Состояния VPN (Включен / Выключен) */
        .phone-mockup.connected .power-btn {
            border-color: #CCFF00;
            box-shadow: 0 0 40px rgba(204, 255, 0, 0.5);
            color: #CCFF00;
        }
        .phone-mockup.connected .status-text {
            color: #CCFF00;
            font-weight: bold;
        }
        
        .timer {
            font-size: 32px;
            font-weight: bold;
            font-family: monospace;
            color: #88888e;
            visibility: hidden;
        }
        .phone-mockup.connected .timer {
            visibility: visible;
            color: #ffffff;
        }

        .footer-info {
            text-align: center;
            width: 100%;
            border-top: 1px solid #222227;
            padding-top: 15px;
        }
        .location { font-size: 16px; color: #ffffff; }
        .ip { font-size: 12px; color: #88888e; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="phone-mockup" id="vpnCard">
        <div class="header">
            <div class="logo">COLISEUM<span>VPN</span></div>
            <div class="status-text" id="statusLabel">Отключено</div>
        </div>

        <div class="vpn-button-container">
            <button class="power-btn" id="connectBtn"><span>Включить</span></button>
        </div>

        <div class="timer" id="timerDisplay">00:00:00</div>

        <div class="footer-info">
            <div class="location" id="locationLabel">Выбор сервера: Авто</div>
            <div class="ip" id="ipLabel">Ваш IP: 192.168.1.1</div>
        </div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const vpnCard = document.getElementById('vpnCard');
        const statusLabel = document.getElementById('statusLabel');
        const timerDisplay = document.getElementById('timerDisplay');
        const locationLabel = document.getElementById('locationLabel');
        const ipLabel = document.getElementById('ipLabel');
        
        let isConnected = false;
        let timerInterval = null;
        let seconds = 0;

        function updateTimer() {
            seconds++;
            let hrs = Math.floor(seconds / 3600);
            let mins = Math.floor((seconds - (hrs * 3600)) / 60);
            let secs = seconds % 60;

            if (secs < 10) secs = '0' + secs;
            if (mins < 10) mins = '0' + mins;
            if (hrs < 10) hrs = '0' + hrs;

            timerDisplay.innerText = `${hrs}:${mins}:${secs}`;
        }

        connectBtn.addEventListener('click', () => {
            isConnected = !isConnected;
            
            if (isConnected) {
                // Включение VPN
                vpnCard.classList.add('connected');
                statusLabel.innerText = 'Подключено';
                connectBtn.querySelector('span').innerText = 'Выключить';
                locationLabel.innerText = 'Сервер: Германия (Франкфурт)';
                ipLabel.innerText = 'Защищенный IP: 185.220.101.5';
                
                // Запуск таймера
                seconds = 0;
                timerDisplay.innerText = "00:00:00";
                timerInterval = setInterval(updateTimer, 1000);
            } else {
                // Выключение VPN
                vpnCard.classList.remove('connected');
                statusLabel.innerText = 'Отключено';
                connectBtn.querySelector('span').innerText = 'Включить';
                locationLabel.innerText = 'Выбор сервера: Авто';
                ipLabel.innerText = 'Ваш IP: 192.168.1.1';
                
                // Остановка таймера
                clearInterval(timerInterval);
            }
        });
    </script>

</body>
</html>

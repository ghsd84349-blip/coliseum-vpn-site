<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coliseum VPN — Панель управления</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #070709;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-hidden: hidden;
        }

        /* Шапка сайта */
        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(11, 11, 14, 0.5);
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 22px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }
        .logo span { color: #CCFF00; }

        /* Кнопка Плюсик для конфигураций */
        .add-config-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .add-config-btn:hover {
            background: #CCFF00;
            color: #000000;
            border-color: #CCFF00;
        }

        /* Главный контейнер для контента */
        .content-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ЭКРАН 1: ГЛАВНОЕ МЕНЮ */
        .screen {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status-container { text-align: center; margin-bottom: 30px; }
        .status-title { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #88888e; margin-bottom: 10px; }
        .status-current { font-size: 32px; font-weight: 700; }
        .config-sub { font-size: 14px; color: #88888e; margin-top: 5px; }

        .power-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #111115;
            border: 4px solid #222227;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            outline: none;
        }
        .power-button:hover { transform: scale(1.02); }

        .timer-display {
            font-size: 40px;
            font-family: monospace;
            margin-top: 20px;
            color: #ffffff;
            opacity: 0;
        }

        /* Сетка Трафика (Получено / Отправлено) */
        .traffic-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 500px;
            margin-top: 30px;
        }
        .traffic-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .traffic-label { font-size: 11px; color: #88888e; text-transform: uppercase; margin-bottom: 5px; }
        .traffic-value { font-size: 18px; font-weight: 600; color: #ffffff; }

        /* ЭКРАН 2: НАСТРОЙКИ */
        .hidden { display: none !important; }
        .settings-list {
            width: 100%;
            max-width: 500px;
            background: #111115;
            border-radius: 16px;
            border: 1px solid #222227;
            padding: 10px 0;
        }
        .settings-item {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: 0.2s;
        }
        .settings-item:last-child { border-bottom: none; }
        .settings-item:hover { background: rgba(255,255,255,0.02); }
        .settings-item.danger { color: #ff3333; }

        /* Окно добавления конфигурации (Модальное) */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .modal-content {
            background: #111115;
            border: 1px solid #222227;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .modal-content h3 { margin-bottom: 10px; font-size: 20px; text-transform: uppercase; color: #CCFF00; }
        .modal-content p { font-size: 14px; color: #88888e; margin-bottom: 20px; }
        .modal-content input {
            width: 100%; padding: 12px; background: #1a1a1f; border: 1px solid #222227;
            border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 20px; outline: none;
        }
        .modal-content input:focus { border-color: #CCFF00; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        .btn-confirm { background: #CCFF00; color: #000; }
        .btn-cancel { background: #222227; color: #fff; }

        /* Нижнее меню вкладок */
        nav.bottom-nav {
            width: 100%;
            background: #111115;
            border-top: 1px solid #222227;
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 15px 0;
        }
        .nav-item {
            background: none; border: none; color: #88888e; font-size: 14px;
            font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .nav-item.active { color: #CCFF00; }

        /* Стили активного состояния VPN */
        body.connected-state { background: radial-gradient(circle at center, #0e1405 0%, #070709 100%); }
        body.connected-state .power-button { border-color: #CCFF00; box-shadow: 0 0 40px rgba(204, 255, 0, 0.3); color: #CCFF00; }
        body.connected-state .timer-display { opacity: 1; }
    </style>
</head>
<body>

    <header>
        <div class="logo">COLISEUM<span>VPN</span></div>
        <div class="add-config-btn" id="openModalBtn">+</div>
    </header>

    <div class="content-wrapper">
        
        <div class="screen" id="mainScreen">
            <div class="status-container">
                <div class="status-title">Конфигурация</div>
                <div class="status-current" id="statusText">ОТКЛЮЧЕНО</div>
                <div class="config-sub" id="currentConfigName">Базовая конфигурация</div>
            </div>

            <button class="power-button" id="vpnButton">Включить</button>
            <div class="timer-display" id="timer">00:00:00</div>

            <div class="traffic-grid">
                <div class="traffic-card">
                    <div class="traffic-label">Получено</div>
                    <div class="traffic-value" id="receivedText">0 КБ</div>
                </div>
                <div class="traffic-card">
                    <div class="traffic-label">Отправлено</div>
                    <div class="traffic-value" id="sentText">0 КБ</div>
                </div>
            </div>
        </div>

        <div class="screen hidden" id="settingsScreen">
            <div class="status-container">
                <div class="status-title">Настройки</div>
            </div>
            <div class="settings-list">
                <div class="settings-item" onclick="alert('Coliseum VPN v1.0.0 — Разработано для портфолио.')">
                    <span>О приложении</span><span>›</span>
                </div>
                <div class="settings-item" onclick="alert('Ваш трафик полностью зашифрован. Мы не собираем логи.')">
                    <span>Приватность</span><span>›</span>
                </div>
                <div class="settings-item" onclick="alert('Использование сервиса разрешено исключительно в целях тестирования.')">
                    <span>Условия использования</span><span>›</span>
                </div>
                <div class="settings-item danger" id="resetConfigBtn">
                    <span>Сбросить конфигурацию</span><span>↺</span>
                </div>
            </div>
        </div>

    </div>

    <div class="modal hidden" id="configModal">
        <div class="modal-content">
            <h3>Конфигурация</h3>
            <p>Вставьте ссылку сервера ниже:</p>
            <input type="text" id="configUrlInput" placeholder="vless:// или wireguard://...">
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" id="closeModalBtn">Отмена</button>
                <button class="modal-btn btn-confirm" id="saveConfigBtn">Добавить</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" id="tabMain">Главная</button>
        <button class="nav-item" id="tabSettings">Настройки</button>
    </nav>

    <script>
        // Элементы интерфейса
        const vpnButton = document.getElementById('vpnButton');
        const body = document.body;
        const statusText = document.getElementById('statusText');
        const timerDisplay = document.getElementById('timer');
        const receivedText = document.getElementById('receivedText');
        const sentText = document.getElementById('sentText');
        const currentConfigName = document.getElementById('currentConfigName');
        
        // Вкладки
        const tabMain = document.getElementById('tabMain');
        const tabSettings = document.getElementById('tabSettings');
        const mainScreen = document.getElementById('mainScreen');
        const settingsScreen = document.getElementById('settingsScreen');

        // Модалка
        const configModal = document.getElementById('configModal');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const saveConfigBtn = document.getElementById('saveConfigBtn');
        const configUrlInput = document.getElementById('configUrlInput');
        const resetConfigBtn = document.getElementById('resetConfigBtn');

        let isConnected = false;
        let timerInterval = null;
        let trafficInterval = null;
        let seconds = 0;
        let bytesReceived = 0;
        let bytesSent = 0;

        // Переключение вкладок
        tabMain.addEventListener('click', () => {
            tabMain.classList.add('active'); tabSettings.classList.remove('active');
            mainScreen.classList.remove('hidden'); settingsScreen.classList.add('hidden');
        });
        tabSettings.addEventListener('click', () => {
            tabSettings.classList.add('active'); tabMain.classList.remove('active');
            settingsScreen.classList.remove('hidden'); mainScreen.classList.add('hidden');
        });

        // Модальное окно конфигураций
        openModalBtn.addEventListener('click', () => configModal.classList.remove('hidden'));
        closeModalBtn.addEventListener('click', () => { configModal.classList.add('hidden'); configUrlInput.value = ''; });
        
        saveConfigBtn.addEventListener('click', () => {
            if(configUrlInput.value.trim() !== "") {
                currentConfigName.innerText = "Пользовательская ссылка: " + configUrlInput.value.substring(0, 20) + "...";
                alert("Новая конфигурация успешно применена!");
            }
            configModal.classList.add('hidden');
            configUrlInput.value = '';
        });

        resetConfigBtn.addEventListener('click', () => {
            currentConfigName.innerText = "Базовая конфигурация";
            alert("Конфигурация сброшена до начальной.");
        });

        // Форматирование трафика (КБ / МБ)
        function formatTraffic(bytes) {
            if (bytes < 1024) return bytes + " Б";
            let kb = bytes / 1024;
            if (kb < 1024) return kb.toFixed(1) + " КБ";
            let mb = kb / 1024;
            return mb.toFixed(2) + " МБ";
        }

        // Логика работы VPN и трафика
        vpnButton.addEventListener('click', () => {
            isConnected = !isConnected;

            if (isConnected) {
                body.classList.add('connected-state');
                statusText.style.color = '#CCFF00';
                statusText.innerText = 'ПОДКЛЮЧЕНО';
                vpnButton.innerText = 'Выключить';
                
                // Сброс таймера и трафика при старте
                seconds = 0;
                bytesReceived = 0;
                bytesSent = 0;
                timerDisplay.innerText = "00:00:00";
                
                // Запуск симуляции
                timerInterval = setInterval(() => {
                    seconds++;
                    let hrs = Math.floor(seconds / 3600);
                    let mins = Math.floor((seconds - (hrs * 3600)) / 60);
                    let secs = seconds % 60;
                    timerDisplay.innerText = `${hrs < 10 ? '0'+hrs : hrs}:${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;
                }, 1000);

                trafficInterval = setInterval(() => {
                    // Скорость имитирует скачивание файлов случайными порциями
                    bytesReceived += Math.floor(Math.random() * 350000) + 50000;
                    bytesSent += Math.floor(Math.random() * 40000) + 5000;
                    receivedText.innerText = formatTraffic(bytesReceived);
                    sentText.innerText = formatTraffic(bytesSent);
                }, 800);

            } else {
                body.classList.remove('connected-state');
                statusText.style.color = '#ffffff';
                statusText.innerText = 'ОТКЛЮЧЕНО';
                vpnButton.innerText = 'Включить';
                
                clearInterval(timerInterval);
                clearInterval(trafficInterval);
            }
        });
    </script>
</body>
</html>
